spring.application.name=arena-billiard
spring.jpa.open-in-view=false

# 1. Konfigurasi Koneksi Database MySQL XAMPP
spring.datasource.url=jdbc:mysql://localhost:3306/arena-billiard?serverTimezone=Asia/Jakarta
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Konfigurasi Hibernate (Penting!)
# ddl-auto=update akan memerintahkan Spring Boot untuk membuatkan tabel secara otomatis
# berdasarkan class Entity (@Entity) yang sudah Anda buat (Meja, Member, Pemesanan)
spring.jpa.hibernate.ddl-auto=update

# 3. (Opsional) Menampilkan log SQL di terminal agar kita tahu aktivitas databasenya
spring.jpa.show-sql=true